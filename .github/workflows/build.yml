name: "publish"

on:
  # Allow running this workflow manually from the Actions tab.
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      # Monorepo: only build the desktop app when its files (or this workflow) change.
      - "apps/desktop/**"
      - ".github/workflows/build.yml"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Arm based macs (M1 and above).
            args: "--target universal-apple-darwin"
            utmt_asset: "UTMT_CLI_v0.8.2.0-macOS.zip"
          - platform: "macos-latest" # for Intel based macs.
            args: "--target x86_64-apple-darwin"
            utmt_asset: "UTMT_CLI_v0.8.2.0-macOS.zip"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            # Skip the AppImage target: it runs linuxdeploy, which scans every ELF in the
            # AppDir and chokes on the bundled .NET UTMT runtime (libcoreclr.so et al.).
            # deb/rpm just copy resources, so they bundle UTMT fine.
            args: "--bundles deb,rpm"
            utmt_asset: "UTMT_CLI_v0.8.2.0-Ubuntu.zip"
          - platform: "windows-latest"
            args: ""
            utmt_asset: "UTMT_CLI_v0.8.2.0-Windows.zip"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.
        # You can remove the one that doesn't apply to your app to speed up the workflow a bit.

      - name: install frontend dependencies
        working-directory: apps/desktop
        run: npm install # change this to npm, pnpm or bun depending on which one you use.

      # Bundle the pinned, self-contained UndertaleModCli (UTMT) so users never install or pick it.
      # The matching per-platform asset is fetched and unzipped into the Tauri resource folder
      # (apps/desktop/src-tauri/resources/utmt) that tauri.conf.json bundles into the installer.
      - name: bundle UTMT CLI (${{ matrix.utmt_asset }})
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $dest = "apps/desktop/src-tauri/resources/utmt"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          gh release download 0.8.2.0 --repo UnderminersTeam/UndertaleModTool --pattern "${{ matrix.utmt_asset }}" --dir "$env:RUNNER_TEMP" --clobber
          Expand-Archive -Path "$env:RUNNER_TEMP/${{ matrix.utmt_asset }}" -DestinationPath $dest -Force
          if (-not (Test-Path "$dest/UndertaleModCli") -and -not (Test-Path "$dest/UndertaleModCli.exe")) {
            throw "UndertaleModCli not found in $dest after extracting ${{ matrix.utmt_asset }}"
          }

      - uses: tauri-apps/tauri-action@v0.5.20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_GITHUB_BASE_URL: ${{ secrets.VITE_GITHUB_BASE_URL }}
          VITE_GITHUB_APP_CLIENT_ID: ${{ secrets.VITE_GITHUB_APP_CLIENT_ID }}
          VITE_TRANSLATION_API_BASE_URL: ${{ secrets.VITE_TRANSLATION_API_BASE_URL }}
          VITE_DRFR_WEBSITE_URL: ${{ secrets.VITE_DRFR_WEBSITE_URL }}
          VITE_GITHUB_BASE_BRANCH: ${{ secrets.VITE_GITHUB_BASE_BRANCH }}
          VITE_GITHUB_BETA_BRANCH: ${{ secrets.VITE_GITHUB_BETA_BRANCH }}

        with:
          projectPath: apps/desktop # Monorepo: the Tauri app lives in this subdirectory.
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          includeDebug: true
          args: ${{ matrix.args }}
